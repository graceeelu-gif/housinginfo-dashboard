function MetricCard({label,value,change,changeLabel,prefix="",suffix="",sub,accent:isAccent}) {
  const isPos = change > 0;
  return (
    <div style={{background:isAccent?C.accentSoft:C.card,border:"1px solid "+(isAccent?"rgba(123,175,207,0.3)":C.cardBorder),borderRadius:12,padding:"20px 22px",flex:1,minWidth:155,boxShadow:"0 2px 10px rgba(45,42,38,.03)"}}>
      <div style={{fontSize:10,color:C.textMuted,letterSpacing:".07em",textTransform:"uppercase",marginBottom:8,fontWeight:500}}>{label}</div>
      <div style={{fontSize:28,fontWeight:300,color:isAccent?C.accent:C.text,letterSpacing:"-0.02em",lineHeight:1.1}}>{prefix}{typeof value==="number"?value.toLocaleString():value}{suffix}</div>
      {change !== undefined && (
        <div style={{marginTop:8,display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:11,fontWeight:600,color:isPos?C.green:C.red,background:isPos?C.greenSoft:C.redSoft,padding:"2px 8px",borderRadius:10}}>
            {isPos?"&#9650;":"&#9660;"} {Math.abs(change)}%
          </span>
          <span style={{fontSize:10,color:C.textDim}}>{changeLabel||"vs prev 30d"}</span>
        </div>
      )}
      {sub && <div style={{fontSize:10,color:C.textDim,marginTop:6,lineHeight:1.4}}>{sub}</div>}
    </div>
  );
}

function Section({children,sub,title,style:s}) {
  return (
    <div style={{background:C.card,border:"1px solid "+C.cardBorder,borderRadius:12,padding:24,marginBottom:20,boxShadow:"0 2px 12px rgba(45,42,38,.04)",...(s||{})}}>
      {title && <div style={{marginBottom:16}}>
        <h2 style={{fontSize:15,fontWeight:500,color:C.text,margin:0}}>{title}</h2>
        {sub && <p style={{fontSize:11,color:C.textDim,margin:"4px 0 0"}}>{sub}</p>}
      </div>}
      {children}
    </div>
  );
}

function Insight({color,bg,children}) {
  return <div style={{marginTop:14,padding:"10px 14px",background:bg||C.accentSoft,borderRadius:6,fontSize:12,color:color||C.accent,lineHeight:1.6}}>{children}</div>;
}

function StatusBadge({status}) {
  const m = {testing:{bg:C.blueSoft,color:C.blue,l:"Testing"},early:{bg:C.accentSoft,color:C.accent,l:"Early Data"},planned:{bg:"rgba(100,116,139,0.12)",color:"#94a3b8",l:"Planned"},validated:{bg:C.greenSoft,color:C.green,l:"Validated"}};
  const s = m[status]||m.planned;
  return <span style={{fontSize:9,padding:"3px 10px",borderRadius:10,background:s.bg,color:s.color,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em"}}>{s.l}</span>;
}

function DataRow({label,value,sub,highlight,barPct}) {
  return (
    <div style={{padding:"8px 0",borderBottom:"1px solid "+C.cardBorder}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:12,color:highlight?C.accent:C.text,fontWeight:highlight?500:400}}>{label}</span>
        <span style={{fontSize:12,color:C.textMuted}}>{value}{sub && <span style={{fontSize:10,color:C.textDim,marginLeft:4}}>{sub}</span>}</span>
      </div>
      {barPct !== undefined && (
        <div style={{background:"#EDE8E2",borderRadius:3,height:4,marginTop:5,overflow:"hidden"}}>
          <div style={{width:Math.max(barPct,1)+"%",height:"100%",background:highlight?C.accent:C.ch2,borderRadius:3,opacity:0.7}} />
        </div>
      )}
    </div>
  );
}

const Tip = ({active,payload,label}) => {
  if (!active||!payload) return null;
  return (
    <div style={{background:"#FFFFFF",border:"1px solid #E4DDD5",borderRadius:8,padding:"10px 14px",fontSize:11,boxShadow:"0 4px 16px rgba(45,42,38,.08)"}}>
      <div style={{color:"#8A857E",marginBottom:5,fontWeight:500}}>{label}</div>
      {payload.map((p,i) => (
        <div key={i} style={{color:p.color||"#2D2A26",marginBottom:1}}>{p.name}: <strong>{typeof p.value==="number"&&p.value%1!==0?"$"+p.value.toFixed(2):p.value!=null?p.value.toLocaleString():0}</strong></div>
      ))}
    </div>
  );
};

                      background:item.priority==="critical"?"rgba(212,131,107,0.15)":item.priority==="high"?C.greenSoft:item.priority==="medium"?C.accentSoft:"rgba(181,175,168,0.15)",
                      color:item.priority==="critical"?"#C06B50":item.priority==="high"?C.green:item.priority==="medium"?C.accent:"#8A857E"
                    }}>{item.priority}</span>
                  </div>
                  <div style={{fontSize:11,color:C.textMuted,lineHeight:1.5,marginBottom:6}}>{item.desc}</div>
                  <div style={{display:"flex",gap:16,fontSize:10,color:C.textDim}}>
                    <span>Track: <span style={{color:C.green}}>{item.metric}</span></span>
                    <span>Freq: <span style={{color:C.textMuted}}>{item.freq}</span></span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </Section>

        <Section title="Weekly Content Calendar Template" sub="Suggested posting rhythm based on your data">
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead><tr style={{borderBottom:"1px solid "+C.cardBorder}}>
                {["Day","TOFU (Awareness)","MOFU (Consideration)","BOFU (Conversion)"].map(h=>
                  <th key={h} style={{padding:"8px 12px",textAlign:"left",color:C.textMuted,fontWeight:500,fontSize:10,textTransform:"uppercase"}}>{h}</th>
                )}
              </tr></thead>
              <tbody>
                {[
                  {day:"Monday",tofu:"Trend Reel",mofu:"Educational Carousel",bofu:"&mdash;"},
                  {day:"Tuesday",tofu:"&mdash;",mofu:"Style Quiz Carousel",bofu:"FAQ Stories"},
                  {day:"Wednesday",tofu:"Before/After Carousel",mofu:"Product Teaser",bofu:"&mdash;"},
                  {day:"Thursday",tofu:"Meme / Hot Take",mofu:"Testimonial Stories",bofu:"Walkthrough Reel"},
                  {day:"Friday",tofu:"Trend Reel",mofu:"&mdash;",bofu:"Comparison Carousel"},
                  {day:"Saturday",tofu:"Collab Reel (2x/mo)",mofu:"Process Breakdown",bofu:"&mdash;"},
                  {day:"Sunday",tofu:"Before/After Carousel",mofu:"Style Quiz Carousel",bofu:"Urgency Story (launches)"},
                ].map((r,i) => (
                  <tr key={i} style={{borderBottom:"1px solid "+C.cardBorder}}>
                    <td style={{padding:"8px 12px",color:C.text,fontWeight:500}}>{r.day}</td>
                    <td style={{padding:"8px 12px",color:r.tofu==="&mdash;"?C.textDim:C.blue}}>{r.tofu}</td>
                    <td style={{padding:"8px 12px",color:r.mofu==="&mdash;"?C.textDim:C.accent}}>{r.mofu}</td>
                    <td style={{padding:"8px 12px",color:r.bofu==="&mdash;"?C.textDim:C.green}}>{r.bofu}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <Insight>This gives you ~14 posts/week across all funnel stages. Adjust frequency based on bandwidth &mdash; prioritize MOFU content since your biggest gap is site visitor &rarr; quiz completion (3.4%).</Insight>
        </Section>

        <Section title="Experiment Tracker" sub="A/B tests to run on content types &mdash; track what moves the needle">
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {[
              {test:"Quiz Carousel vs. Direct Link Carousel",hypothesis:"Quiz carousels will drive 2x more site visits than generic 'link in bio' CTAs",metric:"Bio link taps &rarr; quiz starts",status:"not started"},
              {test:"Before/After vs. Styled Room Reel",hypothesis:"Before/afters get more saves but styled reels drive more CTA clicks",metric:"Saves vs. CTA clicks per impression",status:"not started"},
              {test:"'Comment DREAM' vs. 'Link in Bio'",hypothesis:"ManyChat comment trigger will outperform passive link-in-bio by 3x on conversions",metric:"DM opens &rarr; site visits &rarr; purchases",status:"not started"},
              {test:"$9.99 Teaser vs. $29.99 Value Pitch",hypothesis:"Leading with $29.99 value comparison converts better than $9.99 entry price",metric:"Purchase tier distribution",status:"not started"},
              {test:"Story Polls vs. Carousel Quizzes",hypothesis:"Story polls get faster engagement but carousels drive deeper site interaction",metric:"Quiz completion rate by source",status:"not started"},
            ].map((exp,i) => (
              <div key={i} style={{padding:"14px 16px",background:"#FAF7F4",borderRadius:8,border:"1px solid "+C.cardBorder}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:12,fontWeight:600,color:C.text}}>{exp.test}</span>
                  <span style={{fontSize:8,padding:"2px 8px",borderRadius:8,fontWeight:700,textTransform:"uppercase",background:"rgba(181,175,168,0.15)",color:"#8A857E"}}>{exp.status}</span>
                </div>
                <div style={{fontSize:11,color:C.textMuted,lineHeight:1.5,marginBottom:4}}>{exp.hypothesis}</div>
                <div style={{fontSize:10,color:C.textDim}}>Key Metric: <span style={{color:C.accent}}>{exp.metric}</span></div>
              </div>
            ))}
          </div>
        </Section>
      </div>)}

      {/* FOOTER */}
      <div style={{marginTop:28,padding:"14px 0",borderTop:"1px solid "+C.cardBorder,display:"flex",justifyContent:"space-between",fontSize:10,color:C.textDim,flexWrap:"wrap",gap:8}}>
        <span>PostHog &middot; Project: Design Tool (249581) &middot; Org: housing info</span>
        <span>Dashboard generated Mar 31, 2026</span>
      </div>
    </div>
  );
}

ReactDOM.render(<Dashboard />, document.getElementById('root'));
</script>
</body>
