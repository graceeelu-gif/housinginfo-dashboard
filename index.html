function MetricCard({label,value,change,changeLabel,prefix="",suffix="",sub,accent:isAccent}) {
  const isPos = change > 0;
  return (
    <div style={{background:isAccent?C.accentSoft:C.card,border:"1px solid "+(isAccent?"rgba(123,175,207,0.3)":C.cardBorder),borderRadius:12,padding:"20px 22px",flex:1,minWidth:155,boxShadow:"0 2px 10px rgba(45,42,38,.03)"}}>
      <div style={{fontSize:10,color:C.textMuted,letterSpacing:".07em",textTransform:"uppercase",marginBottom:8,fontWeight:500}}>{label}</div>
      <div style={{fontSize:28,fontWeight:300,color:isAccent?C.accent:C.text,letterSpacing:"-0.02em",lineHeight:1.1}}>{prefix}{typeof value==="number"?value.toLocaleString():value}{suffix}</div>
      {change !== undefined && (
        <div style={{marginTop:8,display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:11,fontWeight:600,color:isPos?C.green:C.red,background:isPos?C.greenSoft:C.redSoft,padding:"2px 8px",borderRadius:10}}>
            {isPos?"芒聳虏":"芒聳录"} {Math.abs(change)}%
          </span>
          <span style={{fontSize:10,color:C.textDim}}>{changeLabel||"vs prev 30d"}</span>
        </div>
      )}
      {sub && <div style={{fontSize:10,color:C.textDim,marginTop:6,lineHeight:1.4}}>{sub}</div>}
    </div>
  );
}

        {sub && <p style={{fontSize:11,color:C.textDim,margin:"4px 0 0"}}>{sub}</p>}
      </div>}
      {children}
    </div>
  );
}

  return (
    <div style={{background:"#FFFFFF",border:"1px solid #E4DDD5",borderRadius:8,padding:"10px 14px",fontSize:11,boxShadow:"0 4px 16px rgba(45,42,38,.08)"}}>

      {payload.map((p,i) => (
        <div key={i} style={{color:p.color||"#2D2A26",marginBottom:1}}>{p.name}: <strong>{typeof p.value==="number"&&p.value%1!==0?"$"+p.value.toFixed(2):p.value!=null?p.value.toLocaleString():0}</strong></div>
      ))}
    </div>
  );
};

        </div>

        <Section title="Revenue Timeline" sub="Daily revenue from purchase_completed events (amount_usd)">
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={dailyData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E4DDD5" />
              <XAxis dataKey="date" tick={{fill:C.textDim,fontSize:9}} interval={4} />
              <YAxis tick={{fill:C.textDim,fontSize:9}} tickFormatter={v=>"$"+v} />
              <Tooltip content={<Tip />} />
              <Bar dataKey="revenue" name="Revenue ($)" fill={C.accent} radius={[3,3,0,0]} />
            </BarChart>
          </ResponsiveContainer>
          <Insight>7 purchases across Mar 12芒聙聯28. $29.99 tier dominates (4 of 7 purchases, 75% of revenue). Revenue accelerated in final two weeks.</Insight>
        </Section>

        <Section title="Revenue by Price Tier" sub="Breakdown of 7 purchases">
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            {[{tier:"$29.99",count:4,rev:119.96,color:C.accent},{tier:"$9.99",count:2,rev:19.98,color:C.ch2},{tier:"$19.00",count:1,rev:19,color:C.ch3}].map(p => (
              <div key={p.tier} style={{background:"#FAF7F4",border:"1px solid "+C.cardBorder,borderRadius:8,padding:"16px 20px",flex:"1 1 140px",textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:300,color:p.color}}>{p.tier}</div>
                <div style={{fontSize:11,color:C.textMuted,marginTop:4}}>{p.count} purchases 脗路 ${p.rev.toFixed(2)}</div>
                <div style={{background:"#EDE8E2",borderRadius:3,height:6,marginTop:10,overflow:"hidden"}}>
                  <div style={{width:(p.rev/t.revenue*100)+"%",height:"100%",background:p.color,borderRadius:3}} />
                </div>
                <div style={{fontSize:10,color:C.textDim,marginTop:4}}>{(p.rev/t.revenue*100).toFixed(0)}% of revenue</div>
              </div>
            ))}
          </div>
        </Section>

        <Section title="Conversion Funnel" sub="Full path: Pageview 芒聠聮 CTA 芒聠聮 Quiz 芒聠聮 Purchase">
          {funnelData.map((f,i) => (
            <div key={f.stage} style={{marginBottom:i<funnelData.length-1?14:0}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:13,color:C.text,fontWeight:i===0?500:400}}>{f.stage}</span>
                <span style={{fontSize:13,color:C.textMuted}}>{f.value.toLocaleString()} <span style={{fontSize:10,color:C.textDim}}>({f.pct}%)</span></span>
              </div>
              <div style={{background:"#EDE8E2",borderRadius:4,height:22,overflow:"hidden"}}>
                <div style={{width:Math.max(f.pct,1.5)+"%",height:"100%",background:"linear-gradient(90deg,"+C.accent+","+(i>2?C.ch2:C.accent)+")",borderRadius:4,opacity:0.4+(f.pct/100)*0.6}} />
              </div>
              {i<funnelData.length-1 && (
                <div style={{fontSize:10,color:C.red,marginTop:3,textAlign:"right"}}>芒聠聯 {(100-(funnelData[i+1].value/f.value)*100).toFixed(1)}% drop-off</div>
              )}
            </div>
          ))}
          <Insight color={C.red} bg={C.redSoft}>Biggest leak: CTA Click 芒聠聮 Quiz Shown (69.2% drop). Then 96.6% of quiz viewers abandon without responding.</Insight>
        </Section>

        <Section title="Exit Quiz Performance" sub="Since launch Mar 19">
          <ResponsiveContainer width="100%" height={180}>
            <AreaChart data={dailyData.filter(d=>parseInt(d.date.split(" ")[1])>=19)}>
              <defs><linearGradient id="gQ" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.purple} stopOpacity={0.3}/><stop offset="100%" stopColor={C.purple} stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#E4DDD5" />
              <XAxis dataKey="date" tick={{fill:C.textDim,fontSize:9}} />
              <YAxis tick={{fill:C.textDim,fontSize:9}} />
              <Tooltip content={<Tip />} />
              <Area type="monotone" dataKey="quiz" name="Quiz Shown" stroke={C.purple} fill="url(#gQ)" strokeWidth={2} />
              <Line type="monotone" dataKey="quizResp" name="Quiz Responses" stroke={C.green} strokeWidth={2.5} dot={{r:3,fill:C.green}} />
            </AreaChart>
          </ResponsiveContainer>
          <div style={{display:"flex",gap:12,marginTop:14,flexWrap:"wrap"}}>
            <MetricCard label="Quiz Shown" value={t.quiz} sub="Since Mar 19" />
            <MetricCard label="Quiz Responses" value={t.quizResp} sub={t.quizRespRate+"% response rate"} />
          </div>
        </Section>
      </div>)}

      {/* AUDIENCE & DEVICES */}
      {tab==="audience" && (<div>
        <div style={{display:"flex",gap:20,marginBottom:20,flexWrap:"wrap"}}>
          <Section title="Traffic Sources" sub="Referring domains (30d)" style={{flex:"1 1 380px",marginBottom:0}}>
            <div style={{display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
              <ResponsiveContainer width={170} height={170}>
                <PieChart><Pie data={referralData} dataKey="value" cx="50%" cy="50%" outerRadius={72} innerRadius={42} paddingAngle={1} strokeWidth={0}>
                  {referralData.map((d,i)=><Cell key={i} fill={d.color} />)}
                </Pie></PieChart>
              </ResponsiveContainer>
              <div>{referralData.map(d=>(
                <div key={d.name} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                  <div style={{width:8,height:8,borderRadius:2,background:d.color,flexShrink:0}} />
                  <span style={{fontSize:11,color:C.text}}>{d.name}</span>
                  <span style={{fontSize:11,color:C.textMuted,marginLeft:2}}>{d.value.toLocaleString()}</span>
                </div>
              ))}</div>
            </div>
            <Insight>60% Instagram (combined = 1,470). 38% Direct (916) 芒聙聰 likely link-in-bio clicks losing referrer. Search traffic minimal.</Insight>
          </Section>

          <Section title="Device Breakdown" sub="Pageviews by device type" style={{flex:"1 1 300px",marginBottom:0}}>
            {deviceData.map(d => (
              <div key={d.name} style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:10,height:10,borderRadius:2,background:d.color}} />
                    <span style={{fontSize:12,color:C.text}}>{d.name}</span>
                  </div>
                  <span style={{fontSize:12,color:C.textMuted}}>{d.value.toLocaleString()} <span style={{fontSize:10,color:C.textDim}}>({d.pct}%)</span></span>
                </div>
                <div style={{background:"#EDE8E2",borderRadius:3,height:8,overflow:"hidden"}}>
                  <div style={{width:d.pct+"%",height:"100%",background:d.color,borderRadius:3,opacity:0.7}} />
                </div>
              </div>
            ))}
            <Insight color={C.accent} bg={C.accentSoft}>81.7% mobile. Every design decision must be mobile-optimized first.</Insight>
          </Section>
        </div>

        <Section title="Browser Breakdown" sub="Top browsers by pageview count">
          <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
            {browserData.map(b => (
              <div key={b.name} style={{background:"#FAF7F4",border:"1px solid "+C.cardBorder,borderRadius:8,padding:"12px 16px",minWidth:130,flex:"1 1 130px"}}>
                <div style={{fontSize:12,color:C.text,fontWeight:b.pct>10?500:400}}>{b.name}</div>
                <div style={{fontSize:20,fontWeight:300,color:b.pct>10?C.text:C.textMuted,marginTop:4}}>{b.value.toLocaleString()}</div>
                <div style={{fontSize:10,color:C.textDim,marginTop:2}}>{b.pct}% of traffic</div>
              </div>
            ))}
          </div>
          <Insight color={C.blue} bg={C.blueSoft}>Mobile Safari (53.6%) + Chrome (44.2%) = 97.8% of all traffic.</Insight>
        </Section>

        <Section title="UX Health: Rage Clicks" sub="$rageclick events 芒聙聰 users clicking repeatedly in frustration">
          <ResponsiveContainer width="100%" height={140}>
            <BarChart data={dailyData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E4DDD5" />
              <XAxis dataKey="date" tick={{fill:C.textDim,fontSize:9}} interval={6} />
              <YAxis tick={{fill:C.textDim,fontSize:9}} allowDecimals={false} />
              <Tooltip content={<Tip />} />
              <Bar dataKey="rage" name="Rage Clicks" fill={C.red} radius={[3,3,0,0]} />
            </BarChart>
          </ResponsiveContainer>
          <div style={{display:"flex",gap:12,marginTop:10,flexWrap:"wrap"}}>
            <MetricCard label="Total Rage Clicks" value={t.rage} sub="6 across 30 days 芒聙聰 low, healthy" />
            <MetricCard label="Rage Click Rate" value={((t.rage/t.sessions)*100).toFixed(2)} suffix="%" sub="Per session 芒聙聰 under 1% is good" />
          </div>
        </Section>
      </div>)}

      {/* CONTENT & PAGES */}
      {tab==="content" && (<div>
        <div style={{display:"flex",gap:20,marginBottom:20,flexWrap:"wrap"}}>
          <Section title="CTA Clicks by Page" sub="Which pages drive the most CTA engagement" style={{flex:"1 1 380px",marginBottom:0}}>
            {ctaByPage.map((p,i)=><DataRow key={i} label={p.page} value={p.clicks+" clicks"} sub={"("+p.pct+"%)"} highlight={i===0} barPct={p.pct} />)}
            <Insight>Homepage drives most CTA clicks (197), but #pricing section is strong secondary (109). Style pages with #pricing anchors also convert.</Insight>
          </Section>

          <Section title="Top Landing Pages" sub="Pageviews by URL" style={{flex:"1 1 380px",marginBottom:0}}>
            {landingPages.map((p,i)=><DataRow key={i} label={p.page} value={p.views+" views"} sub={"("+p.pct+"%)"} highlight={i===0} barPct={p.pct} />)}
            <Insight color={C.blue} bg={C.blueSoft}>63.5% goes to "Other" 芒聙聰 largely UTM-tagged URLs. Consider canonicalizing UTM URLs in PostHog.</Insight>
          </Section>
        </div>

        <Section title="Page Exit Analysis" sub="Where users leave ($pageleave events)">
          <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
            <div style={{flex:"1 1 300px"}}>
              {pageExits.map((p,i)=><DataRow key={i} label={p.page} value={p.exits+" exits"} highlight={i===0} barPct={(p.exits/998)*100} />)}
            </div>
            <div style={{flex:"1 1 280px",display:"flex",flexDirection:"column",gap:10}}>
              <Insight color={C.red} bg={C.redSoft}>/#pricing is a top exit point (109 exits). Visitors see pricing and leave 芒聙聰 add social proof or a lower entry tier.</Insight>
              <Insight color={C.purple} bg={C.purpleSoft}>/natural-modern-classic has 106 exits vs 112 PVs 芒聙聰 94.6% exit rate. Needs stronger CTA.</Insight>
            </div>
          </div>
        </Section>

        <Section title="Content Performance Table" sub="Page-level metrics at a glance">
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{borderBottom:"1px solid "+C.cardBorder}}>
                {["Page","Views","CTA Clicks","CTA Rate","Exits","Exit Rate"].map(h=>
                  <th key={h} style={{padding:"8px 12px",textAlign:"left",color:C.textMuted,fontWeight:500,fontSize:10,textTransform:"uppercase",letterSpacing:".05em"}}>{h}</th>
                )}
              </tr></thead>
              <tbody>
                {[
                  {p:"Homepage (/)",pv:671,cta:197,exits:181},
                  {p:"/#pricing",pv:39,cta:109,exits:109},
                  {p:"/natural-modern-classic",pv:112,cta:20,exits:106},
                  {p:"/vintage-charm",pv:26,cta:0,exits:22},
                  {p:"/sunlit-garden-classic",pv:16,cta:29,exits:0},
                  {p:"/elegant-sanctuary",pv:23,cta:0,exits:0},
                ].map((r,i)=>
                  <tr key={i} style={{borderBottom:"1px solid "+C.cardBorder}}>
                    <td style={{padding:"8px 12px",color:C.text}}>{r.p}</td>
                    <td style={{padding:"8px 12px",color:C.textMuted}}>{r.pv}</td>
                    <td style={{padding:"8px 12px",color:r.cta>0?C.ch2:C.textDim}}>{r.cta}</td>
                    <td style={{padding:"8px 12px",color:r.pv>0&&r.cta>0?(r.cta/r.pv*100>30?C.green:C.accent):C.textDim}}>{r.pv>0&&r.cta>0?(r.cta/r.pv*100).toFixed(1)+"%":"芒聙聰"}</td>
                    <td style={{padding:"8px 12px",color:r.exits>0?C.textMuted:C.textDim}}>{r.exits||"芒聙聰"}</td>
                    <td style={{padding:"8px 12px",color:r.pv>0&&r.exits>0?(r.exits/r.pv*100>80?C.red:C.textMuted):C.textDim}}>{r.pv>0&&r.exits>0?(r.exits/r.pv*100).toFixed(0)+"%":"芒聙聰"}</td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </Section>
      </div>)}

      {/* HYPOTHESES & ACTIONS */}
      {tab==="hypotheses" && (<div>
        <Section title="Content & Audience Hypotheses" sub="Track experiments and validate assumptions with data">
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {hypotheses.map(h=>(
              <div key={h.id} style={{background:"#FAF7F4",border:"1px solid "+C.cardBorder,borderRadius:8,padding:"16px 18px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div style={{fontSize:13,color:C.text,flex:1,marginRight:12,lineHeight:1.5}}>{h.hypothesis}</div>
                  <StatusBadge status={h.status} />
                </div>
                <div style={{fontSize:11}}><span style={{color:C.textDim}}>Key Metric: </span><span style={{color:C.accent}}>{h.metric}</span></div>
                <div style={{fontSize:11,color:C.textDim,marginTop:6,lineHeight:1.5}}>{h.notes}</div>
              </div>
            ))}
          </div>
        </Section>

        <Section title="Recommended Actions" sub="Prioritized by data insights">
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {[
              {p:"critical",action:"Fix exit quiz 芒聙聰 3.4% completion. Simplify to 1-2 questions, add incentive.",impact:"Could 5-10x quiz completions",data:"324 shown 芒聠聮 11 responses"},
              {p:"critical",action:"Investigate /#pricing exit rate. 109 people leave at pricing.",impact:"Direct revenue impact",data:"109 exits from pricing"},
              {p:"high",action:"Add UTM params to all IG content to differentiate carousel vs reel traffic.",impact:"Unlocks content format testing",data:"60% IG traffic, can't differentiate"},
              {p:"high",action:"Fix /natural-modern-classic 芒聙聰 94.6% exit rate.",impact:"Recover ~100 monthly exits",data:"112 PVs, 106 exits"},
              {p:"medium",action:"Push $29.99 tier as default 芒聙聰 it's your best seller.",impact:"$29.99 = 75% of revenue",data:"4 of 7 purchases at $29.99"},
              {p:"medium",action:"Create carousels for each style page with deep links.",impact:"Test style-specific funnels",data:"Style pages getting traction"},
              {p:"low",action:"Test ManyChat automation: carousel CTA 芒聠聮 quiz 芒聠聮 product rec.",impact:"Automate the funnel via DM",data:"ManyChat appeared as referrer"},
            ].map((item,i)=>(
              <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"14px 16px",background:"#FAF7F4",borderRadius:8,border:"1px solid "+C.cardBorder}}>
                <span style={{
                  fontSize:8,padding:"3px 8px",borderRadius:8,fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",flexShrink:0,marginTop:3,
                  background:item.p==="critical"?"rgba(212,131,107,0.15)":item.p==="high"?C.redSoft:item.p==="medium"?C.accentSoft:"rgba(181,175,168,0.15)",
                  color:item.p==="critical"?"#C06B50":item.p==="high"?C.red:item.p==="medium"?C.accent:"#8A857E"
                }}>{item.p}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:C.text,lineHeight:1.5}}>{item.action}</div>
                  <div style={{fontSize:10,color:C.green,marginTop:4}}>Impact: {item.impact}</div>
                  <div style={{fontSize:10,color:C.textDim,marginTop:2}}>Data: {item.data}</div>
                </div>
              </div>
            ))}
          </div>
        </Section>

        <Section title="Data Gaps to Fill" sub="What's missing from PostHog for better insights">
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {[
              {gap:"No UTM content tracking",why:"Can't differentiate carousel vs reel vs story traffic",fix:"Add utm_content param to all IG links by post type"},
              {gap:"No scroll depth tracking",why:"Don't know how far visitors read pages",fix:"Add scroll depth autocapture at 25/50/75/100%"},
              {gap:"No email/lead capture events",why:"Can't measure top-of-funnel lead gen",fix:"Track email signup events separately"},
              {gap:"Quiz response content not tracked",why:"Know quiz was answered but not what they chose",fix:"Add quiz answer values as event properties"},
              {gap:"No A/B testing setup",why:"Can't systematically test variants",fix:"Set up PostHog feature flags for experiments"},
            ].map((g,i) => (
              <div key={i} style={{display:"flex",gap:12,padding:"10px 14px",background:"#F5F0EB",borderRadius:6,border:"1px solid "+C.cardBorder}}>
                <div style={{width:3,background:C.ch5,borderRadius:2,flexShrink:0}} />
                <div>
                  <div style={{fontSize:12,color:C.text,fontWeight:500}}>{g.gap}</div>
                  <div style={{fontSize:10,color:C.textDim,marginTop:2}}>Why: {g.why}</div>
                  <div style={{fontSize:10,color:C.ch5,marginTop:2}}>Fix: {g.fix}</div>
                </div>
              </div>
            ))}
          </div>
        </Section>
      </div>)}

      {/* FOOTER */}
      <div style={{marginTop:28,padding:"14px 0",borderTop:"1px solid "+C.cardBorder,display:"flex",justifyContent:"space-between",fontSize:10,color:C.textDim,flexWrap:"wrap",gap:8}}>
        <span>PostHog 脗路 Project: Design Tool (249581) 脗路 Org: housing info</span>
        <span>Dashboard generated Mar 31, 2026</span>
      </div>
    </div>
  );
}

ReactDOM.render(<Dashboard />, document.getElementById('root'));
</script>
</body>
</html>
